name: Flutter CI
# claude code helped generate this file.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: google_maps_in_flutter
        run: flutter pub get



      - name: Verify formatting
        working-directory: google_maps_in_flutter
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        working-directory: google_maps_in_flutter
        run: flutter analyze

      - name: Run tests
        working-directory: google_maps_in_flutter
        run: flutter test
